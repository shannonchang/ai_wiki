name: Deploy Quartz to GitHub Pages

on:
push:
branches:
- main

permissions:
contents: read
pages: write
id-token: write

jobs:
build:
runs-on: ubuntu-latest


steps:
  - uses: actions/checkout@v4

  - uses: actions/setup-node@v4
    with:
      node-version: 20

  - name: Install
    run: |
      cd quartz
      npm install

  - name: Build
    run: |
      cd quartz
      npx quartz build

  - name: Upload
    uses: actions/upload-pages-artifact@v3
    with:
      path: quartz/public

  - name: Deploy
    uses: actions/deploy-pages@v4

